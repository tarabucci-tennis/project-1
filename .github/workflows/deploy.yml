name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Decode SSH key from base64
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY_BASE64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key_path: ~/.ssh/deploy_key
          script: |
            set -e
            if [ ! -d /root/app ]; then
              git clone https://github.com/tarabucci-tennis/project-1 /root/app
            fi
            cd /root/app
            git fetch origin main --quiet
            git reset --hard origin/main
            bash /root/app/bin/force-deploy.sh
