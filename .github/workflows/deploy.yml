name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main
      - 'claude/**'

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to droplet via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            if [ ! -d /root/app ]; then
              git clone https://github.com/tarabucci-tennis/project-1 /root/app
            fi
            cd /root/app
            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            docker build -t project-1 .
            docker stop project-1 || true
            docker rm project-1 || true
            docker run -d \
              -p 80:80 \
              -e "RAILS_MASTER_KEY=${{ secrets.RAILS_MASTER_KEY }}" \
              -v /root/storage:/rails/storage \
              --name project-1 \
              --restart unless-stopped \
              project-1
            echo "Deployed successfully"
