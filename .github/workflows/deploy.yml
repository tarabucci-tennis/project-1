# Auto-deploy is DISABLED.
# Deploy manually from the Droplet console:
#   cd /root/app && bash bin/deploy-phase-1.sh
#
# This prevents new Claude sessions from accidentally overwriting the live site.

name: Deploy (disabled)

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Manual deploy only
    runs-on: ubuntu-latest
    steps:
      - run: echo "Auto-deploy is disabled. Use bin/deploy-phase-1.sh on the Droplet."
